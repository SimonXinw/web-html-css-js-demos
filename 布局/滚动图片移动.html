<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>滚动图片移动 — IMAX 尺寸演示</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, "Segoe UI", sans-serif;
      background: #0a0a0c;
      color: #f0f0f2;
      padding: clamp(40px, 8vw, 120px) clamp(16px, 4vw, 48px);
    }

    .page_hint {
      padding: clamp(16px, 3vw, 32px) 16px clamp(32px, 5vw, 56px);
      text-align: center;
      font-size: 14px;
      color: #888;
      max-width: 52rem;
      margin-left: auto;
      margin-right: auto;
    }

    .screen_imax_outer {
      position: relative;
    }

    .screen_imax_outer.pb_huge {
      padding-bottom: clamp(120px, 18vw, 300px);
    }

    .screen_imax_outer.pb_regular {
      padding-bottom: clamp(40px, 8vw, 80px);
    }

    .container_grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: clamp(10px, 2vw, 20px);
      width: min(100% - 32px, calc(0.434 * 100vw + 220px));
      max-width: 1320px;
      margin-left: auto;
      margin-right: auto;
      position: relative;
      z-index: 20;
    }

    @media (max-aspect-ratio: 1000 / 1001) {
      .container_grid {
        grid-template-columns: repeat(6, 1fr);
        row-gap: 16px;
        width: calc(100% - 32px);
      }
    }

    .content_column {
      grid-column: 3 / 11;
      display: flex;
      flex-direction: column;
      gap: clamp(10px, 2vw, 20px);
      text-align: center;
    }

    @media (max-aspect-ratio: 1000 / 1001) {
      .content_column {
        grid-column: 1 / 7;
      }
    }

    .content_column h2 {
      margin: 0;
      font-size: clamp(1.25rem, 4vw, 2rem);
      font-weight: 600;
    }

    .content_column p {
      margin: 0;
      line-height: 1.6;
      color: #b8b8c0;
    }

    .duration_zone {
      position: relative;
    }

    .duration_zone.is_duration {
      height: 363svh;
      margin-top: -13svh;
    }

    @media (max-aspect-ratio: 1000 / 1001) {
      .duration_zone.is_duration {
        margin: -26svh 0;
      }
    }

    .sticky_wrap {
      position: sticky;
      top: 0;
      height: 100svh;
    }

    .sticky_stage {
      position: relative;
      width: 100%;
      height: 100%;
    }

    @media (max-aspect-ratio: 1000 / 1001) {
      .sticky_wrap.short_mobile {
        height: 40svh;
      }
    }

    .screen_boundaries {
      position: absolute;
      display: flex;
      justify-content: center;
      align-items: center;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90vw;
      container-type: size;
      container-name: imax-size;
    }

    .screen_boundaries.pos_duration {
      top: 47.5%;
    }

    .screen_boundaries.pos_static {
      top: 39%;
    }

    @media (min-aspect-ratio: 1 / 1) {
      .screen_boundaries {
        height: 70svh;
      }
    }

    @media (max-aspect-ratio: 1000 / 1001) {
      .screen_boundaries.h_duration {
        height: 70svh;
      }

      .screen_boundaries.h_short {
        height: 30svh;
      }
    }

    .screen_container {
      aspect-ratio: 1.9 / 1;
      width: 100%;
      height: auto;
      position: relative;
    }

    @container imax-size (min-aspect-ratio: 1.9 / 1) {
      .screen_container {
        width: auto;
        height: 100%;
      }
    }

    .screen_inner {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .fill_img {
      position: absolute;
      inset: 0;
    }

    .fill_img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .infographic_img {
      opacity: 0;
    }

    .seats_row {
      position: absolute;
      width: var(--fullWidth, 100vw);
      left: 50%;
      transform: translateX(-50%);
      top: 100%;
      margin-top: clamp(30px, 6.25vw, 50px);
    }

    @media (max-aspect-ratio: 1000 / 1001) {
      .seats_row {
        height: clamp(100px, 30vw, 120px);
      }
    }

    @media (min-aspect-ratio: 1 / 1) {
      .seats_row {
        aspect-ratio: 344 / 64;
        height: auto;
      }
    }

    .seats_row .fill_img img {
      object-position: 50% 0%;
    }

    .size_block_offset {
      position: relative;
      z-index: 20;
      margin-top: 125svh;
    }

    .caption_overlay {
      position: absolute;
      inset: 0;
      z-index: 30;
      pointer-events: none;
      overflow: hidden;
    }

    .stage_caption {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(92%, 640px);
      margin: 0;
      text-align: center;
      transform: translate(-50%, -50%);
      transition: none;
    }

    .stage_caption h2 {
      margin: 0 0 10px;
      font-size: clamp(1.15rem, 3.6vw, 1.75rem);
      font-weight: 600;
      color: #f5f5f7;
      text-shadow: 0 1px 18px rgba(0, 0, 0, 0.65);
    }

    .stage_caption p {
      margin: 0;
      line-height: 1.55;
      font-size: clamp(0.85rem, 2.2vw, 1rem);
      color: rgba(235, 235, 240, 0.88);
      text-shadow: 0 1px 14px rgba(0, 0, 0, 0.55);
    }

    .footer_space {
      height: clamp(48vh, 55vh, 72vh);
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 13px;
      padding: clamp(32px, 6vw, 80px) 16px;
    }
  </style>
</head>
<body>
  <p class="page_hint">
    向下滚动页面：中央「银幕」裁切与两张叠加图按时间轴切换；各阶段说明文案从视窗下方滑入中线，与对应画面一一对应后退场（复刻 valerion ScreenImaxSize 思路）。
  </p>
  <div id="root"></div>
  <div class="footer_space">底部留白，便于继续滚动</div>

  <script type="module">
    import React, { useCallback, useEffect, useMemo, useRef, useState } from "https://esm.sh/react@18.2.0";
    import { createRoot } from "https://esm.sh/react-dom@18.2.0/client";
    import htm from "https://esm.sh/htm@3.1.1";

    const html = htm.bind(React.createElement);

    const DEMO_IMAGES = {
      content: "https://picsum.photos/seed/screencontent/1920/1000",
      imax: "https://picsum.photos/seed/imaxlayer/1200/800",
      size: "https://picsum.photos/seed/sizelayer/1200/800",
      seats: "https://picsum.photos/seed/theaterseats/1400/260",
    };

    const usePortraitLayout = () => {
      const [isPortrait, setPortrait] = useState(() =>
        window.matchMedia("(max-aspect-ratio: 1000/1001)").matches
      );

      useEffect(() => {
        const mq = window.matchMedia("(max-aspect-ratio: 1000/1001)");
        const onChange = () => setPortrait(mq.matches);
        mq.addEventListener("change", onChange);
        return () => mq.removeEventListener("change", onChange);
      }, []);

      return isPortrait;
    };

    const easeOutCubic = (t) => 1 - (1 - t) ** 3;

    const captionTimings = {
      extended: {
        opening: { enterStart: 0.08, enterEnd: 0.42, exitStart: 0.82, exitEnd: 1.12 },
        imax: { enterStart: 1.05, enterEnd: 1.42, exitStart: 2.05, exitEnd: 2.58 },
        size: { enterStart: 4.02, enterEnd: 4.38, exitStart: 4.82, exitEnd: 5.38 },
      },
      short: {
        opening: { enterStart: 0.05, enterEnd: 0.3, exitStart: 0.58, exitEnd: 0.92 },
        imax: { enterStart: 0.88, enterEnd: 1.12, exitStart: 1.52, exitEnd: 1.95 },
        size: null,
      },
    };

    const applyCaptionMotion = (el, currentTime, cfg, offsetEnterPx, offsetExitPx) => {
      if (!el || !cfg) {
        return;
      }

      const { enterStart, enterEnd, exitStart, exitEnd } = cfg;
      let opacity = 0;
      let offsetY = offsetEnterPx;

      if (currentTime < enterStart) {
        opacity = 0;
        offsetY = offsetEnterPx;
      } else if (currentTime < enterEnd) {
        const u = Math.min(Math.max((currentTime - enterStart) / (enterEnd - enterStart), 0), 1);
        const e = easeOutCubic(u);
        opacity = e;
        offsetY = (1 - e) * offsetEnterPx;
      } else if (currentTime < exitStart) {
        opacity = 1;
        offsetY = 0;
      } else if (currentTime < exitEnd) {
        const u = Math.min(Math.max((currentTime - exitStart) / (exitEnd - exitStart), 0), 1);
        opacity = 1 - u;
        offsetY = u * offsetExitPx;
      } else {
        opacity = 0;
        offsetY = offsetExitPx;
      }

      el.style.opacity = String(opacity);
      el.style.transform = `translate(-50%, calc(-50% + ${offsetY}px))`;
    };

    const useInViewSimple = (options = {}) => {
      const [inView, setInView] = useState(false);
      const observerRef = useRef(null);
      const threshold = options.threshold ?? 0;

      const setRef = useCallback((el) => {
        if (observerRef.current) {
          observerRef.current.disconnect();
          observerRef.current = null;
        }

        if (!el) {
          return;
        }

        const obs = new IntersectionObserver(([entry]) => {
          setInView(entry.isIntersecting);
        }, { threshold });

        obs.observe(el);
        observerRef.current = obs;
      }, [threshold]);

      useEffect(() => {
        return () => {
          if (observerRef.current) {
            observerRef.current.disconnect();
          }
        };
      }, []);

      return { ref: setRef, inView };
    };

    const ScreenImaxSize = (props) => {
      const isMobile = usePortraitLayout();
      const { ref: inViewRef, inView } = useInViewSimple({ threshold: 0 });
      const scrollContainerRef = useRef(null);
      const screenRef = useRef(null);
      const infographicOneRef = useRef(null);
      const infographicTwoRef = useRef(null);
      const captionOpeningRef = useRef(null);
      const captionImaxRef = useRef(null);
      const captionSizeRef = useRef(null);

      const isDuration = useMemo(
        () => !!(props.imaxImage?.src || props.sizeImage?.src),
        [props.imaxImage?.src, props.sizeImage?.src]
      );

      const hasCaptionOpening = Boolean(props.captionOpening);
      const hasCaptionImax = Boolean(props.captionImax);
      const hasCaptionSize = Boolean(props.captionSize);

      const computedSpaceBottom = useMemo(() => {
        if (isDuration) {
          return "huge";
        }

        return props.spaceBottom || (isMobile ? "regular" : "huge");
      }, [isDuration, props.spaceBottom, isMobile]);

      useEffect(() => {
        if (!isDuration || !inView) {
          return;
        }

        const container = scrollContainerRef.current;
        const screen = screenRef.current;
        const infographicOne = infographicOneRef.current;
        const infographicTwo = infographicTwoRef.current;
        const captionOpening = captionOpeningRef.current;
        const captionImax = captionImaxRef.current;
        const captionSize = captionSizeRef.current;

        if (!container || !screen || !infographicOne) {
          return;
        }

        let currentProgress = 0;
        let targetProgress = 0;
        let animationFrameId = 0;

        const lerp = (start, end, factor) => start + (end - start) * factor;
        const clamp = (val, min, max) => Math.min(Math.max(val, min), max);
        const mapRange = (value, inMin, inMax, outMin, outMax) =>
          outMin + (outMax - outMin) * ((value - inMin) / (inMax - inMin));

        screen.style.clipPath = "polygon(0% 13%, 100% 13%, 100% 87%, 0% 87%)";
        screen.style.opacity = "1";
        infographicOne.style.opacity = "0";
        if (infographicTwo) {
          infographicTwo.style.opacity = "0";
        }

        const handleScroll = () => {
          const rect = container.getBoundingClientRect();
          const windowHeight = window.innerHeight;
          const totalDistance = rect.height - windowHeight;

          if (totalDistance <= 0) {
            targetProgress = 1;
            return;
          }

          const scrolled = -rect.top;
          targetProgress = clamp(scrolled / totalDistance, 0, 1);
        };

        const updateAnimation = () => {
          currentProgress = lerp(currentProgress, targetProgress, 0.1);

          const hasExtendedAnim =
            hasCaptionSize ||
            !!props.contentSize ||
            (!!props.sizeImage?.src && !!infographicTwoRef.current);
          const TOTAL_TIME = hasExtendedAnim ? 5.5 : 2;
          const currentTime = currentProgress * TOTAL_TIME;
          const timingKey = hasExtendedAnim ? "extended" : "short";
          const timings = captionTimings[timingKey];
          const offsetEnterPx = isMobile ? 72 : 112;
          const offsetExitPx = isMobile ? -28 : -40;

          const clipProgress = clamp(mapRange(currentTime, 0, 2, 0, 1), 0, 1);
          const topY = lerp(13, 0, clipProgress);
          const bottomY = lerp(87, 100, clipProgress);
          screen.style.clipPath = `polygon(0% ${topY}%, 100% ${topY}%, 100% ${bottomY}%, 0% ${bottomY}%)`;

          let info1Opacity = 0;
          if (currentTime >= 1) {
            info1Opacity = clamp(mapRange(currentTime, 1, 2, 0, 1), 0, 1);
          }

          if (hasExtendedAnim) {
            if (currentTime >= 2) {
              const fadeOut = clamp(mapRange(currentTime, 2, 3.5, 0, 1), 0, 1);
              info1Opacity = lerp(1, 0, fadeOut);
            }

            let screenOpacity = 1;
            if (currentTime >= 2 && currentTime < 4) {
              if (currentTime <= 3.5) {
                screenOpacity = lerp(1, 0.4, clamp(mapRange(currentTime, 2, 3.5, 0, 1), 0, 1));
              } else {
                screenOpacity = 0.4;
              }
            } else if (currentTime >= 4) {
              screenOpacity = lerp(0.4, 1, clamp(mapRange(currentTime, 4, 5, 0, 1), 0, 1));
            }
            screen.style.opacity = screenOpacity.toString();

            const infoTwoEl = infographicTwoRef.current;
            if (infoTwoEl) {
              let info2Opacity = 0;
              if (currentTime >= 4) {
                info2Opacity = clamp(mapRange(currentTime, 4, 5, 0, 1), 0, 1);
              }
              infoTwoEl.style.opacity = info2Opacity.toString();
            }
          }

          infographicOne.style.opacity = info1Opacity.toString();

          if (captionOpening && hasCaptionOpening) {
            applyCaptionMotion(captionOpening, currentTime, timings.opening, offsetEnterPx, offsetExitPx);
          }

          if (captionImax && hasCaptionImax) {
            applyCaptionMotion(captionImax, currentTime, timings.imax, offsetEnterPx, offsetExitPx);
          }

          if (captionSize && hasCaptionSize && hasExtendedAnim && timings.size) {
            applyCaptionMotion(captionSize, currentTime, timings.size, offsetEnterPx, offsetExitPx);
          } else if (captionSize) {
            captionSize.style.opacity = "0";
            captionSize.style.transform = `translate(-50%, calc(-50% + ${offsetEnterPx}px))`;
          }

          animationFrameId = requestAnimationFrame(updateAnimation);
        };

        window.addEventListener("scroll", handleScroll, { passive: true });
        handleScroll();
        animationFrameId = requestAnimationFrame(updateAnimation);

        return () => {
          window.removeEventListener("scroll", handleScroll);
          cancelAnimationFrame(animationFrameId);
        };
      }, [
        inView,
        isDuration,
        props.contentSize,
        props.sizeImage?.src,
        isMobile,
        hasCaptionOpening,
        hasCaptionImax,
        hasCaptionSize,
      ]);

      const outerPbClass =
        computedSpaceBottom === "huge" ? "pb_huge" : "pb_regular";

      return html`
        <div ref=${scrollContainerRef} className=${`screen_imax_outer ${outerPbClass}`}>
          ${props.contentImax &&
          html`
            <div className="container_grid">
              <div className="content_column bodyLarge">${props.contentImax}</div>
            </div>
          `}
          <div
            ref=${inViewRef}
            className=${`duration_zone${isDuration ? " is_duration" : ""}`}
          >
            <div
              className=${`sticky_wrap${isDuration || !isMobile ? "" : " short_mobile"}`}
            >
              <div className="sticky_stage">
                <div
                  className=${`screen_boundaries ${isDuration ? "pos_duration" : "pos_static"} ${
                    isMobile
                      ? isDuration
                        ? "h_duration"
                        : "h_short"
                      : ""
                  }`}
                >
                  <div className="screen_container">
                    <div ref=${screenRef} className="screen_inner">
                      ${props.contentImage &&
                      html`
                        <div className="fill_img content-image">
                          <img src=${props.contentImage.src} alt=${props.contentImage.alt || ""} />
                        </div>
                      `}
                      ${props.imaxImage &&
                      html`
                        <div ref=${infographicOneRef} className="fill_img infographic_img imax-image">
                          <img src=${props.imaxImage.src} alt="" />
                        </div>
                      `}
                      ${props.sizeImage?.src &&
                      html`
                        <div ref=${infographicTwoRef} className="fill_img infographic_img size-image">
                          <img src=${props.sizeImage.src} alt="" />
                        </div>
                      `}
                    </div>
                    <div className="seats_row">
                      ${props.seatsImage &&
                      html`
                        <div className="fill_img">
                          <img src=${props.seatsImage.src} alt="" />
                        </div>
                      `}
                    </div>
                  </div>
                </div>
                ${isDuration &&
                html`
                  <div className="caption_overlay" aria-hidden="true">
                    ${hasCaptionOpening &&
                    html`
                      <div ref=${captionOpeningRef} className="stage_caption stage_caption_opening">
                        ${props.captionOpening}
                      </div>
                    `}
                    ${hasCaptionImax &&
                    html`
                      <div ref=${captionImaxRef} className="stage_caption stage_caption_imax">
                        ${props.captionImax}
                      </div>
                    `}
                    ${hasCaptionSize &&
                    html`
                      <div ref=${captionSizeRef} className="stage_caption stage_caption_size">
                        ${props.captionSize}
                      </div>
                    `}
                  </div>
                `}
              </div>
            </div>
            ${props.contentSize &&
            html`
              <div className="container_grid size_block_offset">
                <div className="content_column bodyLarge">${props.contentSize}</div>
              </div>
            `}
          </div>
        </div>
      `;
    };

    const App = () => html`
      <${ScreenImaxSize}
        captionOpening=${html`
          <h2>银幕视野展开</h2>
          <p>随滚动，裁切区域自上下向全幅打开，对应底层主画面逐步铺满视野。</p>
        `}
        captionImax=${html`
          <h2>IMAX 信息图层</h2>
          <p>与第一层叠加图同步出现；本段结束后图层淡出，为下一阶段让出视觉焦点。</p>
        `}
        captionSize=${html`
          <h2>尺寸与沉浸说明</h2>
          <p>第二层叠加图与文案一一对应：仅在尺寸图层显现窗口内进入、停留并退场。</p>
        `}
        contentImage=${{ src: DEMO_IMAGES.content, alt: "演示主画面" }}
        imaxImage=${{ src: DEMO_IMAGES.imax }}
        sizeImage=${{ src: DEMO_IMAGES.size }}
        seatsImage=${{ src: DEMO_IMAGES.seats }}
      />
    `;

    createRoot(document.getElementById("root")).render(html`<${App} />`);
  </script>
</body>
</html>
