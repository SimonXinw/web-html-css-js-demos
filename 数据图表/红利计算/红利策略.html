<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易方达中证红利ETF · 年线策略</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --red:   #e53e3e;
            --green: #22a959;
            --blue:  #2563eb;
            --gold:  #d4a017;
            --bg:    #f0f4f8;
            --card:  #ffffff;
            --text:  #1a202c;
            --light: #718096;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, #1a365d, #2563eb);
            color: #fff;
            border-radius: 16px;
            padding: 24px 32px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .header h1 { font-size: 1.5rem; font-weight: 700; }
        .header .meta { font-size: 0.85rem; opacity: 0.75; margin-top: 4px; }

        /* ── Upload fallback ── */
        .upload-zone {
            display: none;
            text-align: center;
            padding: 40px;
            background: var(--card);
            border-radius: 16px;
            border: 2px dashed #cbd5e0;
            cursor: pointer;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }
        .upload-zone:hover { border-color: var(--blue); }
        .upload-zone input { display: none; }
        .upload-zone .icon { font-size: 2.5rem; margin-bottom: 12px; }
        .upload-zone p { color: var(--light); }
        .upload-zone strong { color: var(--blue); }

        /* ── Loading ── */
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--light);
            font-size: 1rem;
            display: none;
        }
        .loading.active { display: block; }

        /* ── Stats row ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--card);
            border-radius: 12px;
            padding: 18px 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            border-left: 4px solid #e2e8f0;
        }
        .stat-card.red   { border-left-color: var(--red); }
        .stat-card.green { border-left-color: var(--green); }
        .stat-card.blue  { border-left-color: var(--blue); }
        .stat-card.gold  { border-left-color: var(--gold); }
        .stat-card .label {
            font-size: 0.78rem;
            color: var(--light);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card .value {
            font-size: 1.55rem;
            font-weight: 700;
            line-height: 1;
        }
        .stat-card .sub {
            font-size: 0.8rem;
            color: var(--light);
            margin-top: 5px;
        }
        .up   { color: var(--red); }
        .down { color: var(--green); }
        .neutral { color: var(--blue); }

        /* ── Chart card ── */
        .chart-card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }
        .chart-card h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text);
        }
        #mainChart { width: 100%; height: 440px; }

        /* ── Deviation bar chart ── */
        #deviationChart { width: 100%; height: 200px; }

        /* ── Footer ── */
        footer {
            text-align: center;
            color: var(--light);
            font-size: 0.8rem;
            padding: 16px 0;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            #mainChart  { height: 300px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>📈 易方达中证红利ETF · 年线策略看板</h1>
        <div class="meta" id="headerMeta">正在加载数据...</div>
    </div>
    <div id="headerBadge"></div>
</div>

<!-- 上传降级区域 -->
<div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <div class="icon">📂</div>
    <p>无法自动加载文件（file:// 协议限制）</p>
    <p><strong>点击这里手动选择</strong> 易方达中证红利ETF_基金净值.xlsx</p>
</div>

<div class="loading active" id="loading">数据加载中，请稍候...</div>

<!-- 统计数字 -->
<div class="stats-grid" id="statsGrid" style="display:none;">
    <div class="stat-card blue">
        <div class="label">最新单位净值</div>
        <div class="value" id="statNav">--</div>
        <div class="sub" id="statDate">--</div>
    </div>
    <div class="stat-card gold">
        <div class="label">250日均线 (年线)</div>
        <div class="value" id="statMa250">--</div>
        <div class="sub">近250个交易日均价</div>
    </div>
    <div class="stat-card" id="statDeviationCard">
        <div class="label">偏离年线</div>
        <div class="value" id="statDeviation">--</div>
        <div class="sub" id="statDeviationHint">--</div>
    </div>
    <div class="stat-card gold" style="border-left-color:#7c3aed;">
        <div class="label">5日均线 (周线)</div>
        <div class="value" id="statMa5">--</div>
        <div class="sub">近5个交易日均价</div>
    </div>
</div>

<!-- 主折线图 -->
<div class="chart-card" id="chartCardMain" style="display:none;">
    <h2>净值走势 · 年线 / 周线对比</h2>
    <div id="mainChart"></div>
</div>

<!-- 偏离度柱状图 -->
<div class="chart-card" id="chartCardDev" style="display:none;">
    <h2>年线偏离度 (%)</h2>
    <div id="deviationChart"></div>
</div>

<footer>数据来源：用户导入 Excel · 图表仅供参考，不构成投资建议</footer>

<script>
    // ── 常量 ──────────────────────────────────────────────────────────────────
    const FILE_NAME = "易方达中证红利ETF_基金净值.xlsx";
    const MA250_N   = 250;
    const MA5_N     = 5;

    // ── DOM refs ──────────────────────────────────────────────────────────────
    const loadingEl   = document.getElementById("loading");
    const uploadZone  = document.getElementById("uploadZone");
    const statsGrid   = document.getElementById("statsGrid");
    const fileInput   = document.getElementById("fileInput");
    const chartMain   = document.getElementById("chartCardMain");
    const chartDev    = document.getElementById("chartCardDev");

    // ── Helpers ───────────────────────────────────────────────────────────────
    function fmt(n, decimals = 4) {
        return typeof n === "number" ? n.toFixed(decimals) : "--";
    }
    function fmtPct(n) {
        if (typeof n !== "number") return "--";
        const sign = n >= 0 ? "+" : "";
        return sign + n.toFixed(2) + "%";
    }
    function calcMA(closes, n) {
        return closes.map((_, i) => {
            if (i < n - 1) return null;
            const slice = closes.slice(i - n + 1, i + 1);
            return slice.reduce((s, v) => s + v, 0) / n;
        });
    }
    function deviation(price, ma) {
        if (!ma) return null;
        return (price / ma - 1) * 100;
    }

    // ── Parse xlsx ArrayBuffer ────────────────────────────────────────────────
    function parseBuffer(arrayBuffer) {
        const data   = new Uint8Array(arrayBuffer);
        const wb     = XLSX.read(data, { type: "array" });
        const sheet  = wb.Sheets[wb.SheetNames[0]];
        const rows   = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });

        if (!rows || rows.length < 2) {
            throw new Error("文件内容为空或格式错误");
        }

        // 第一行是列头
        const headers = rows[0].map(String);
        const dateIdx = headers.findIndex(h => h.includes("净值日期"));
        const navIdx  = headers.findIndex(h => h.includes("单位净值"));

        if (dateIdx < 0 || navIdx < 0) {
            throw new Error("未找到「净值日期」或「单位净值」列，请检查文件格式");
        }

        const records = [];
        for (let i = 1; i < rows.length; i++) {
            const row  = rows[i];
            const date = String(row[dateIdx] || "").trim();
            const nav  = parseFloat(row[navIdx]);
            if (!date || isNaN(nav)) continue;
            records.push({ date, nav });
        }

        // 按日期升序排列
        records.sort((a, b) => a.date.localeCompare(b.date));
        return records;
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function render(records) {
        if (!records.length) {
            loadingEl.textContent = "解析后无有效数据，请检查文件";
            return;
        }

        const dates   = records.map(r => r.date);
        const closes  = records.map(r => r.nav);
        const ma250   = calcMA(closes, MA250_N);
        const ma5     = calcMA(closes, MA5_N);
        const devPct  = closes.map((c, i) => deviation(c, ma250[i]));

        // 增强 records
        records.forEach((r, i) => {
            r.ma250  = ma250[i];
            r.ma5    = ma5[i];
            r.devPct = devPct[i];
        });

        // ── 最新统计 ──────────────────────────────────────────────────────────
        const last     = records[records.length - 1];
        const lastDev  = last.devPct;
        const isUp     = lastDev !== null && lastDev >= 0;

        document.getElementById("statNav").textContent     = fmt(last.nav);
        document.getElementById("statDate").textContent    = last.date;
        document.getElementById("statMa250").textContent   = last.ma250 ? fmt(last.ma250) : "--";
        document.getElementById("statMa5").textContent     = last.ma5   ? fmt(last.ma5)   : "--";

        const devEl   = document.getElementById("statDeviation");
        const devCard = document.getElementById("statDeviationCard");
        const devHint = document.getElementById("statDeviationHint");

        if (lastDev !== null) {
            devEl.textContent   = fmtPct(lastDev);
            devEl.className     = isUp ? "value up" : "value down";
            devCard.className   = isUp ? "stat-card red" : "stat-card green";
            devHint.textContent = isUp ? "高于年线，注意风险" : "低于年线，关注机会";
        }

        // ── Header badge ──────────────────────────────────────────────────────
        document.getElementById("headerMeta").textContent =
            `数据共 ${records.length} 条 · 最新 ${last.date}`;

        if (lastDev !== null) {
            const color = isUp ? "#fc8181" : "#68d391";
            document.getElementById("headerBadge").innerHTML = `
                <div style="background:rgba(255,255,255,0.15);padding:10px 18px;border-radius:10px;text-align:center;">
                    <div style="font-size:0.75rem;opacity:0.8;">偏离年线</div>
                    <div style="font-size:1.8rem;font-weight:700;color:${color};">${fmtPct(lastDev)}</div>
                </div>`;
        }

        // ── Show panels ───────────────────────────────────────────────────────
        loadingEl.style.display = "none";
        statsGrid.style.display = "grid";
        chartMain.style.display = "block";
        chartDev.style.display  = "block";

        // ── Main chart ────────────────────────────────────────────────────────
        const echartsMain = echarts.init(document.getElementById("mainChart"));
        echartsMain.setOption({
            backgroundColor: "#fff",
            grid: { top: 60, right: 40, bottom: 60, left: 60 },
            tooltip: {
                trigger: "axis",
                backgroundColor: "#1a202c",
                borderColor: "#2d3748",
                textStyle: { color: "#e2e8f0", fontSize: 12 },
                formatter(params) {
                    const idx  = params[0].dataIndex;
                    const rec  = records[idx];
                    const dev  = rec.devPct;
                    const sign = dev !== null && dev >= 0 ? "+" : "";
                    const devColor = dev !== null
                        ? (dev >= 0 ? "#fc8181" : "#68d391")
                        : "#a0aec0";
                    const devText = dev !== null
                        ? `<span style="color:${devColor};font-weight:700;">${sign}${dev.toFixed(2)}%</span>`
                        : `<span style="color:#a0aec0;">--</span>`;

                    return `
                        <div style="padding:4px 0;min-width:180px;">
                            <div style="font-size:11px;color:#a0aec0;margin-bottom:6px;">${rec.date}</div>
                            <div style="display:flex;justify-content:space-between;gap:20px;margin-bottom:3px;">
                                <span style="color:#90cdf4;">单位净值</span>
                                <span style="font-weight:700;">${rec.nav.toFixed(4)}</span>
                            </div>
                            <div style="display:flex;justify-content:space-between;gap:20px;margin-bottom:3px;">
                                <span style="color:#fbd38d;">MA250 年线</span>
                                <span>${rec.ma250 ? rec.ma250.toFixed(4) : "--"}</span>
                            </div>
                            <div style="display:flex;justify-content:space-between;gap:20px;margin-bottom:3px;">
                                <span style="color:#d6bcfa;">MA5 周线</span>
                                <span>${rec.ma5 ? rec.ma5.toFixed(4) : "--"}</span>
                            </div>
                            <div style="border-top:1px solid #2d3748;margin-top:6px;padding-top:6px;display:flex;justify-content:space-between;gap:20px;">
                                <span style="color:#e2e8f0;">偏离年线</span>
                                ${devText}
                            </div>
                        </div>`;
                }
            },
            legend: {
                top: 8,
                right: 10,
                textStyle: { color: "#4a5568", fontSize: 12 },
                icon: "roundRect"
            },
            xAxis: {
                type: "category",
                data: dates,
                axisLabel: {
                    fontSize: 11,
                    color: "#718096",
                    interval: Math.floor(dates.length / 10),
                    rotate: dates.length > 100 ? 30 : 0
                },
                axisLine: { lineStyle: { color: "#e2e8f0" } }
            },
            yAxis: {
                type: "value",
                scale: true,
                axisLabel: { fontSize: 11, color: "#718096" },
                splitLine: { lineStyle: { color: "#f0f4f8", type: "dashed" } }
            },
            dataZoom: [
                {
                    type: "inside",
                    start: Math.max(0, 100 - (MA250_N / records.length) * 100 * 2),
                    end: 100
                },
                {
                    type: "slider",
                    height: 24,
                    bottom: 4,
                    start: Math.max(0, 100 - (MA250_N / records.length) * 100 * 2),
                    end: 100,
                    textStyle: { color: "#718096", fontSize: 10 }
                }
            ],
            series: [
                {
                    name: "单位净值",
                    type: "line",
                    data: closes,
                    lineStyle: { color: "#2563eb", width: 2 },
                    itemStyle: { color: "#2563eb" },
                    showSymbol: false,
                    areaStyle: {
                        color: {
                            type: "linear",
                            x: 0, y: 0, x2: 0, y2: 1,
                            colorStops: [
                                { offset: 0, color: "rgba(37,99,235,0.15)" },
                                { offset: 1, color: "rgba(37,99,235,0.01)" }
                            ]
                        }
                    },
                    z: 3
                },
                {
                    name: "MA250 年线",
                    type: "line",
                    data: ma250,
                    lineStyle: { color: "#d4a017", width: 2, type: "dashed" },
                    itemStyle: { color: "#d4a017" },
                    showSymbol: false,
                    connectNulls: true,
                    z: 2
                },
                {
                    name: "MA5 周线",
                    type: "line",
                    data: ma5,
                    lineStyle: { color: "#7c3aed", width: 1.5, type: "dotted" },
                    itemStyle: { color: "#7c3aed" },
                    showSymbol: false,
                    connectNulls: true,
                    z: 1
                }
            ]
        });

        // ── Deviation bar chart ───────────────────────────────────────────────
        // Only show rows where ma250 is available
        const devDates = [];
        const devData  = [];
        records.forEach(r => {
            if (r.devPct === null) return;
            devDates.push(r.date);
            devData.push(parseFloat(r.devPct.toFixed(2)));
        });

        const echartsDiv = echarts.init(document.getElementById("deviationChart"));
        echartsDiv.setOption({
            backgroundColor: "#fff",
            grid: { top: 16, right: 40, bottom: 56, left: 60 },
            tooltip: {
                trigger: "axis",
                backgroundColor: "#1a202c",
                borderColor: "#2d3748",
                textStyle: { color: "#e2e8f0", fontSize: 12 },
                formatter(params) {
                    const v    = params[0].value;
                    const sign = v >= 0 ? "+" : "";
                    const color = v >= 0 ? "#fc8181" : "#68d391";
                    return `<b style="color:#a0aec0;">${params[0].axisValue}</b><br>
                            偏离年线：<span style="color:${color};font-weight:700;">${sign}${v}%</span>`;
                }
            },
            xAxis: {
                type: "category",
                data: devDates,
                axisLabel: {
                    fontSize: 10,
                    color: "#718096",
                    interval: Math.floor(devDates.length / 8),
                    rotate: devDates.length > 60 ? 30 : 0
                },
                axisLine: { lineStyle: { color: "#e2e8f0" } }
            },
            yAxis: {
                type: "value",
                axisLabel: {
                    fontSize: 10,
                    color: "#718096",
                    formatter: v => v + "%"
                },
                splitLine: { lineStyle: { color: "#f0f4f8", type: "dashed" } }
            },
            dataZoom: [
                { type: "inside", start: 0, end: 100 },
                {
                    type: "slider", height: 20, bottom: 2,
                    textStyle: { color: "#718096", fontSize: 10 }
                }
            ],
            series: [
                {
                    type: "bar",
                    data: devData.map(v => ({
                        value: v,
                        itemStyle: { color: v >= 0 ? "#fc8181" : "#68d391" }
                    })),
                    barMaxWidth: 8
                }
            ]
        });

        // ── Resize ────────────────────────────────────────────────────────────
        window.addEventListener("resize", () => {
            echartsMain.resize();
            echartsDiv.resize();
        });
    }

    // ── Load via fetch (same-origin / local server) ───────────────────────────
    function loadViaFetch() {
        fetch(`./${FILE_NAME}`)
            .then(res => {
                if (!res.ok) throw new Error("HTTP " + res.status);
                return res.arrayBuffer();
            })
            .then(buf => render(parseBuffer(buf)))
            .catch(err => {
                console.warn("fetch 失败，切换到手动上传模式:", err.message);
                showUpload();
            });
    }

    function showUpload() {
        loadingEl.style.display = "none";
        uploadZone.style.display = "block";
    }

    // ── File input (fallback) ─────────────────────────────────────────────────
    uploadZone.addEventListener("click", () => fileInput.click());
    uploadZone.addEventListener("dragover", e => {
        e.preventDefault();
        uploadZone.style.borderColor = "#2563eb";
    });
    uploadZone.addEventListener("dragleave", () => {
        uploadZone.style.borderColor = "#cbd5e0";
    });
    uploadZone.addEventListener("drop", e => {
        e.preventDefault();
        uploadZone.style.borderColor = "#cbd5e0";
        const file = e.dataTransfer.files[0];
        if (file) readFile(file);
    });
    fileInput.addEventListener("change", e => {
        const file = e.target.files[0];
        if (file) readFile(file);
    });

    function readFile(file) {
        uploadZone.style.display = "none";
        loadingEl.style.display  = "block";
        loadingEl.textContent    = `正在解析 ${file.name}...`;
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                render(parseBuffer(ev.target.result));
            } catch(e) {
                loadingEl.textContent = "解析失败：" + e.message;
            }
        };
        reader.onerror = () => { loadingEl.textContent = "文件读取失败"; };
        reader.readAsArrayBuffer(file);
    }

    // ── Bootstrap ────────────────────────────────────────────────────────────
    // 先尝试 fetch，如果在 file:// 下会直接进 catch 降级到上传框
    loadViaFetch();
</script>
</body>
</html>
