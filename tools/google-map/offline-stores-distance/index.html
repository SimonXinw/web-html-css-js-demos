<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>线下门店距离查询</title>
  <link rel="stylesheet" href="css/modal.css" />
</head>
<body>

  <!-- 入口页：一个简单按钮打开弹窗 -->
  <div class="demo_page">
    <h1>线下门店查询</h1>
    <p>点击下方按钮打开门店地图选择器</p>
    <button class="open_btn" id="openStoreFinder">查找附近门店</button>
  </div>

  <!-- ===== 弹窗结构 ===== -->
  <div class="store_finder_modal" id="storeFinderModal">
    <!-- 背景遮罩 -->
    <div class="overlay" id="modalOverlay"></div>

    <!-- 弹窗主体 -->
    <div class="modal_body">

      <!-- 顶部标题栏（标题文案由 config.js STORE_FINDER_COPY 注入） -->
      <div class="modal_header">
        <h2 class="title" id="modalTitle">Select store</h2>
        <button class="close_btn" id="closeModal" aria-label="Close">
          <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <!-- 内容区：左侧边栏 + 右地图 -->
      <div class="modal_content">

        <!-- 左侧边栏 -->
        <div class="sidebar_wrapper">

          <!-- 搜索区域 -->
          <div class="search_section">
            <div class="search_input_wrapper" id="searchBox">
              <!-- 搜索图标 -->
              <div class="search_icon">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="11" cy="11" r="8"></circle>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
              </div>
              <!-- 地址搜索输入框 -->
              <input
                type="text"
                id="searchInput"
                class="search_input"
                placeholder=""
                autocomplete="off"
              />
              <!-- 定位按钮（title 与组件 SearchBox Locate me 一致） -->
              <button class="locate_btn" id="locateBtn" type="button" title="Locate me">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <circle cx="12" cy="12" r="3"></circle>
                  <line x1="12" y1="2" x2="12" y2="4"></line>
                  <line x1="12" y1="20" x2="12" y2="22"></line>
                  <line x1="2" y1="12" x2="4" y2="12"></line>
                  <line x1="20" y1="12" x2="22" y2="12"></line>
                </svg>
              </button>
              <!-- Places 自动补全下拉列表 -->
              <ul class="search_dropdown" id="searchDropdown"></ul>
            </div>
            <p class="search_desc" id="searchDesc"></p>
          </div>

          <!-- 门店列表（由 sidebar.js 动态渲染） -->
          <div class="list_wrapper">
            <div class="list_container" id="storeList"></div>
            <!-- 加载中遮罩 -->
            <div class="spinner_overlay" id="spinnerOverlay" style="display:none">
              <div class="spinner"></div>
            </div>
          </div>

        </div>

        <!-- 右侧地图区域 -->
        <div class="map_area" id="mapArea">
          <div id="googleMap" style="width:100%;height:100%;"></div>
          <!-- Maps 脚本加载中占位 -->
          <div class="map_loading" id="mapLoading">
            <div class="spinner"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ===== 定位被拒弹窗 ===== -->
  <div class="location_denied_wrap" id="locationDeniedModal" style="display:none">
    <div class="location_denied_overlay" id="locationDeniedOverlay"></div>
    <div class="location_denied_content">
      <button class="ld_close_btn" id="locationDeniedClose">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <div class="ld_icon_wrapper">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
        </svg>
      </div>
      <h3 class="ld_title" id="locationDeniedTitle">Location Access</h3>
      <p class="ld_text" id="locationDeniedDesc"></p>
      <button class="got_it_btn" id="gotItBtn" type="button">Got it</button>
    </div>
  </div>

  <!-- 按加载顺序引入脚本 -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/map.js"></script>
  <script src="js/modal.js"></script>

  <!--
    Google Maps JS API
    - libraries=places  → Places Autocomplete
    - libraries=marker  → AdvancedMarkerElement（自定义头像标记）
    - callback=onGoogleMapsReady → 脚本加载完后通知 modal.js
  -->
  <script>
    function onGoogleMapsReady() {
      document.dispatchEvent(new Event("googlemapsready"));
    }
  </script>
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAOavTIWq4qRgppoQYzktYy5j0Yshb3HRI&libraries=places,marker&callback=onGoogleMapsReady&loading=async"
    async
    defer
  ></script>

</body>
</html>
