<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片下载工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        [v-cloak] { display: none; }
        /* 自定义滚动条样式，让界面更精致 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8; 
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">
    <div id="app" v-cloak class="min-h-screen flex flex-col">
        <!-- 顶部导航 -->
        <header class="bg-white shadow-sm sticky top-0 z-20">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <a href="https://simonxinw.github.io/web-html-css-js-demos/" class="flex items-center gap-1.5 px-2 py-1.5 text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" title="返回首页">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                        <span class="text-sm font-medium hidden sm:block">首页</span>
                    </a>
                    <div class="w-px h-5 bg-gray-200 hidden sm:block"></div>
                    <div class="flex items-center gap-2">
                        <div class="p-1.5 sm:p-2 bg-blue-100 rounded-lg text-blue-600">
                            <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        </div>
                        <h1 class="text-base sm:text-xl font-bold text-gray-900">图片下载工具</h1>
                    </div>
                </div>
                <div class="flex items-center gap-2 sm:gap-3">
                    <button @click="showJsonModal = true" class="px-3 py-1.5 sm:px-4 sm:py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition shadow-sm text-sm sm:text-base flex items-center gap-1.5 font-medium">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                        提取 JSON 图片
                    </button>
                    <button @click="showInputModal = true" class="px-3 py-1.5 sm:px-4 sm:py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition shadow-sm text-sm sm:text-base flex items-center gap-1.5 font-medium">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                        输入 URL
                    </button>
                    <button @click="reloadImages" :disabled="images.length === 0" :class="['px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg transition shadow-sm text-sm sm:text-base flex items-center gap-1.5 font-medium', images.length === 0 ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-green-600 text-white hover:bg-green-700']">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        重新加载
                    </button>
                    <button @click="batchDownload" :disabled="images.length === 0 || isDownloadingBatch" :class="['px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg transition shadow-sm text-sm sm:text-base flex items-center gap-1.5 font-medium', images.length === 0 || isDownloadingBatch ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-purple-600 text-white hover:bg-purple-700']">
                        <svg v-if="isDownloadingBatch" class="animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        <svg v-else class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        批量下载
                    </button>
                </div>
            </div>
        </header>

        <!-- 主体内容 -->
        <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
            <!-- 空状态 -->
            <div v-if="images.length === 0" class="h-[60vh] flex flex-col items-center justify-center text-gray-400">
                <div class="w-32 h-32 mb-6 bg-gray-100 rounded-full flex items-center justify-center">
                    <svg class="w-16 h-16 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <p class="text-lg font-medium text-gray-600">暂无图片</p>
                <p class="text-sm mt-2">请点击右上角“输入 URL”按钮添加图片链接</p>
            </div>

            <!-- 图片网格 -->
            <div v-else class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                <div v-for="(img, index) in images" :key="index" class="bg-white rounded-xl shadow-sm hover:shadow-xl transition-all duration-300 border border-gray-100 overflow-hidden flex flex-col group">
                    <!-- 图片展示区 -->
                    <div class="h-48 bg-gray-50 relative flex items-center justify-center p-3 border-b border-gray-100 overflow-hidden">
                        <img v-show="!img.error" :src="img.url" :alt="img.name" class="max-w-full max-h-full object-contain transition-transform duration-300 group-hover:scale-105" @error="handleImageError(img)">
                        
                        <!-- 错误提示 -->
                        <div v-if="img.error" class="absolute inset-0 bg-gray-50 flex flex-col items-center justify-center text-red-400 p-4 text-center">
                            <svg class="w-10 h-10 mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <span class="text-sm font-medium">图片加载失败</span>
                        </div>
                    </div>
                    
                    <!-- 信息与操作区 -->
                    <div class="p-4 flex flex-col flex-1">
                        <h3 class="text-sm font-medium text-gray-800 truncate mb-1" :title="img.name">{{ img.name }}</h3>
                        <p class="text-xs text-emerald-600 mb-4 font-mono bg-emerald-50 border border-emerald-100 inline-block px-2 py-1 rounded self-start">{{ img.sizeFormatted || '未知大小' }}</p>
                        
                        <div class="mt-auto">
                            <button @click="downloadSingle(img)" :disabled="img.error || img.isDownloading" class="w-full py-2.5 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-600 hover:text-white transition-colors duration-200 text-sm font-medium flex items-center justify-center gap-1.5 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:bg-blue-50 disabled:hover:text-blue-600">
                                <svg v-if="img.isDownloading" class="animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                <svg v-else class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                下载图片
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 输入 URL 弹窗 -->
        <div v-if="showInputModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-0">
            <!-- 背景遮罩 -->
            <div class="absolute inset-0 bg-gray-900 bg-opacity-50 backdrop-blur-sm transition-opacity" @click="showInputModal = false"></div>
            
            <!-- 弹窗内容 -->
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh] relative z-10 transform transition-all">
                <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                    <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                        输入图片 URL
                    </h2>
                    <button @click="showInputModal = false" class="text-gray-400 hover:text-gray-600 hover:bg-gray-100 p-1.5 rounded-lg transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <div class="p-6 flex-1 overflow-y-auto">
                    <div class="mb-4 flex items-start gap-2 text-sm text-blue-700 bg-blue-50 p-3 rounded-lg">
                        <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <p>支持输入单个或多个 URL。多个 URL 请使用<strong>换行、逗号或空格</strong>进行分隔。</p>
                    </div>
                    <textarea v-model="urlInput" rows="10" class="w-full border border-gray-200 rounded-xl shadow-inner p-4 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm font-mono resize-none transition-shadow" placeholder="https://example.com/image1.jpg&#10;https://example.com/image2.png"></textarea>
                </div>
                <div class="px-6 py-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-3">
                    <button @click="showInputModal = false" class="px-5 py-2.5 border border-gray-300 rounded-lg text-gray-700 bg-white hover:bg-gray-50 transition text-sm font-medium shadow-sm">取消</button>
                    <button @click="processUrls" class="px-5 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm font-medium shadow-sm flex items-center gap-2">
                        确认添加
                    </button>
                </div>
            </div>
        </div>

        <!-- 输入 JSON 弹窗 -->
        <div v-if="showJsonModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-0">
            <!-- 背景遮罩 -->
            <div class="absolute inset-0 bg-gray-900 bg-opacity-50 backdrop-blur-sm transition-opacity" @click="showJsonModal = false"></div>
            
            <!-- 弹窗内容 -->
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh] relative z-10 transform transition-all">
                <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                    <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                        <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                        提取 JSON 图片
                    </h2>
                    <button @click="showJsonModal = false" class="text-gray-400 hover:text-gray-600 hover:bg-gray-100 p-1.5 rounded-lg transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <div class="p-6 flex-1 overflow-y-auto">
                    <div class="mb-4 flex items-start gap-2 text-sm text-indigo-700 bg-indigo-50 p-3 rounded-lg">
                        <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <p>请粘贴模板 JSON，将自动提取 shopify://shop_images/ 格式的图片并生成下载链接。</p>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">图片前缀 URL (可修改)</label>
                        <input type="text" v-model="jsonPrefixUrl" class="w-full border border-gray-200 rounded-xl shadow-inner px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm transition-shadow">
                    </div>
                    <textarea v-model="jsonInput" rows="10" class="w-full border border-gray-200 rounded-xl shadow-inner p-4 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm font-mono resize-none transition-shadow" placeholder="在此粘贴 JSON 对象"></textarea>
                </div>
                <div class="px-6 py-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-3">
                    <button @click="showJsonModal = false" class="px-5 py-2.5 border border-gray-300 rounded-lg text-gray-700 bg-white hover:bg-gray-50 transition text-sm font-medium shadow-sm">取消</button>
                    <button @click="processJson" class="px-5 py-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition text-sm font-medium shadow-sm flex items-center gap-2">
                        提取并复制
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, reactive } = Vue;

        createApp({
            setup() {
                const showInputModal = ref(false);
                const urlInput = ref('');
                const showJsonModal = ref(false);
                const jsonInput = ref('');
                const jsonPrefixUrl = ref('https://awolvision.com/cdn/shop/files/');
                const images = ref([]);
                const isDownloadingBatch = ref(false);

                // 提取并复制 JSON 中的图片 URL
                const processJson = async () => {
                    if (!jsonInput.value.trim()) {
                        alert('请输入 JSON 内容');
                        return;
                    }
                    try {
                        const jsonObj = JSON.parse(jsonInput.value);
                        const urls = [];
                        
                        // 确保前缀有斜杠结尾，以便拼接
                        let prefix = jsonPrefixUrl.value.trim();
                        if (prefix && !prefix.endsWith('/')) {
                            prefix += '/';
                        }
                        
                        // 递归查找 shopify://shop_images/ 的值
                        const findUrls = (obj) => {
                            if (typeof obj === 'string') {
                                if (obj.startsWith('shopify://shop_images/')) {
                                    const filename = obj.replace('shopify://shop_images/', '');
                                    // 使用正则表达式匹配常见的图片格式（包含 svg）
                                    if (/\.(webp|jpg|jpeg|png|gif|svg)(\?.*)?$/i.test(filename)) {
                                        urls.push(`${prefix}${filename}`);
                                    }
                                }
                            } else if (Array.isArray(obj)) {
                                obj.forEach(item => findUrls(item));
                            } else if (obj !== null && typeof obj === 'object') {
                                Object.values(obj).forEach(value => findUrls(value));
                            }
                        };
                        
                        findUrls(jsonObj);
                        
                        if (urls.length === 0) {
                            alert('未找到符合 shopify://shop_images/ 格式且为常见图片类型（webp/jpg/png/svg等）的链接！');
                            return;
                        }
                        
                        // 去重
                        const uniqueUrls = [...new Set(urls)];
                        const resultText = uniqueUrls.join('\n');
                        
                        // 尝试复制到剪切板
                        try {
                            await navigator.clipboard.writeText(resultText);
                            alert(`成功提取并复制了 ${uniqueUrls.length} 个图片链接！\n\n可直接粘贴到主界面的“输入 URL”中使用。`);
                        } catch (clipboardError) {
                            // 如果 clipboard API 失败（比如不是 HTTPS 且不是 localhost），可以降级处理
                            console.warn('Clipboard API failed', clipboardError);
                            // 将结果放到输入框中，并提示用户手动复制
                            jsonInput.value = resultText;
                            alert(`提取成功了 ${uniqueUrls.length} 个链接，但自动复制失败。\n\n链接已填入文本框，请手动复制。`);
                            return; // 不要关闭模态框
                        }
                        
                        showJsonModal.value = false;
                        jsonInput.value = '';
                    } catch (error) {
                        alert('JSON 解析失败，请检查输入格式是否正确！\n错误信息：' + error.message);
                    }
                };

                // 解析URL并提取文件名
                const extractFilename = (url) => {
                    try {
                        const urlObj = new URL(url);
                        let pathname = urlObj.pathname;
                        let filename = pathname.substring(pathname.lastIndexOf('/') + 1);
                        if (!filename) {
                            filename = 'image_' + Date.now() + '.jpg';
                        }
                        // 移除可能的查询参数
                        filename = filename.split('?')[0].split('#')[0];
                        return decodeURIComponent(filename);
                    } catch (e) {
                        // 如果URL无效，尝试简单的字符串处理
                        let parts = url.split('/');
                        let lastPart = parts[parts.length - 1];
                        return lastPart ? lastPart.split('?')[0].split('#')[0] : 'image_' + Date.now() + '.jpg';
                    }
                };

                // 格式化文件大小
                const formatBytes = (bytes, decimals = 2) => {
                    if (!+bytes) return '0 Bytes';
                    const k = 1024;
                    const dm = decimals < 0 ? 0 : decimals;
                    const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
                    const i = Math.floor(Math.log(bytes) / Math.log(k));
                    return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
                };

                // 处理输入的URLs
                const processUrls = () => {
                    if (!urlInput.value.trim()) {
                        showInputModal.value = false;
                        return;
                    }

                    // 分割URL：支持换行、逗号、空格
                    const urls = urlInput.value.split(/[\n,\s]+/).filter(url => url.trim() !== '');
                    
                    // 追加到现有列表或重新生成（这里选择追加，用户体验更好，如果想覆盖可以先清空）
                    const newImages = urls.map(url => {
                        return reactive({
                            url: url.trim(),
                            name: extractFilename(url.trim()),
                            size: 0,
                            sizeFormatted: '',
                            error: false,
                            isDownloading: false,
                            blob: null
                        });
                    });

                    images.value = [...images.value, ...newImages];

                    showInputModal.value = false;
                    urlInput.value = ''; // 清空输入框
                    
                    // 尝试获取文件大小
                    newImages.forEach(img => fetchImageInfo(img));
                };

                // 获取图片信息（利用fetch尝试获取blob，顺便解决跨域下载问题）
                const fetchImageInfo = async (img) => {
                    try {
                        const response = await fetch(img.url, { mode: 'cors' });
                        if (response.ok) {
                            const blob = await response.blob();
                            img.blob = blob;
                            img.size = blob.size;
                            img.sizeFormatted = formatBytes(blob.size);
                        }
                    } catch (error) {
                        console.warn('无法通过 CORS 获取图片信息，可能存在跨域限制:', img.url);
                        // 跨域限制，无法获取大小，保持未知
                    }
                };

                // 图片加载失败处理
                const handleImageError = (img) => {
                    img.error = true;
                };

                // 重新加载所有图片
                const reloadImages = () => {
                    const currentUrls = images.value.map(img => img.url);
                    images.value = currentUrls.map(url => {
                        return reactive({
                            url: url,
                            name: extractFilename(url),
                            size: 0,
                            sizeFormatted: '',
                            error: false,
                            isDownloading: false,
                            blob: null
                        });
                    });
                    images.value.forEach(img => fetchImageInfo(img));
                };

                // 单张下载
                const downloadSingle = async (img) => {
                    if (img.error) return;
                    
                    img.isDownloading = true;
                    try {
                        if (img.blob) {
                            // 如果已经获取到了 blob，直接保存
                            saveAs(img.blob, img.name);
                        } else {
                            // 尝试重新获取
                            const response = await fetch(img.url, { mode: 'cors' });
                            if (response.ok) {
                                const blob = await response.blob();
                                saveAs(blob, img.name);
                            } else {
                                throw new Error('Fetch failed');
                            }
                        }
                    } catch (error) {
                        console.warn('CORS 下载失败，尝试降级方案:', error);
                        // 降级方案：创建一个 a 标签尝试下载
                        const a = document.createElement('a');
                        a.href = img.url;
                        a.download = img.name;
                        a.target = '_blank'; // 如果跨域，download属性可能失效，会在新标签页打开
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                    } finally {
                        img.isDownloading = false;
                    }
                };

                // 批量下载（打包为ZIP）
                const batchDownload = async () => {
                    const validImages = images.value.filter(img => !img.error);
                    if (validImages.length === 0) return;

                    isDownloadingBatch.value = true;
                    try {
                        const zip = new JSZip();
                        
                        let hasFiles = false;
                        let failCount = 0;

                        const promises = validImages.map(async (img) => {
                            try {
                                let blob = img.blob;
                                if (!blob) {
                                    const response = await fetch(img.url, { mode: 'cors' });
                                    if (response.ok) {
                                        blob = await response.blob();
                                    }
                                }
                                if (blob) {
                                    // 处理重名文件
                                    let fileName = img.name;
                                    let counter = 1;
                                    while (zip.file(fileName)) {
                                        const nameParts = img.name.split('.');
                                        const ext = nameParts.length > 1 ? '.' + nameParts.pop() : '';
                                        const baseName = nameParts.join('.');
                                        fileName = `${baseName}_${counter}${ext}`;
                                        counter++;
                                    }
                                    zip.file(fileName, blob);
                                    hasFiles = true;
                                } else {
                                    failCount++;
                                }
                            } catch (e) {
                                console.warn(`无法获取 ${img.url} 加入压缩包:`, e);
                                failCount++;
                            }
                        });

                        await Promise.all(promises);

                        if (hasFiles) {
                            const content = await zip.generateAsync({ type: "blob" });
                            saveAs(content, "images_batch_download.zip");
                            if (failCount > 0) {
                                alert(`批量下载完成，但有 ${failCount} 张图片因跨域限制未能打包。`);
                            }
                        } else {
                            alert("由于跨域限制，无法进行批量打包下载。请尝试单张下载。");
                        }
                    } catch (error) {
                        console.error("批量下载出错:", error);
                        alert("批量下载失败，请检查网络或跨域限制。");
                    } finally {
                        isDownloadingBatch.value = false;
                    }
                };

                return {
                    showInputModal,
                    urlInput,
                    showJsonModal,
                    jsonInput,
                    jsonPrefixUrl,
                    images,
                    isDownloadingBatch,
                    processUrls,
                    processJson,
                    handleImageError,
                    reloadImages,
                    downloadSingle,
                    batchDownload
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
