<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE.IO - 极简主义贪吃蛇</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --bg-color: #0f0f13;
            --grid-color: rgba(255, 255, 255, 0.03);
            --primary: #00ff88;
            --accent: #ff0055;
            --ui-bg: rgba(20, 20, 25, 0.85);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            --border-radius: 12px;
            --shadow-glow: 0 0 20px rgba(0, 255, 136, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Space Mono', monospace;
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 游戏主容器 */
        .game-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 20px;
            width: 100%;
            max-width: 600px;
        }

        /* 顶部 HUD */
        .hud-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 8px;
        }

        .game-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .game-title::before {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        /* 状态胶囊 */
        .stats-bar {
            display: flex;
            gap: 12px;
        }

        .stat-capsule {
            background: var(--ui-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .stat-capsule:hover {
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .stat-label {
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 11px;
        }

        .stat-value {
            font-weight: 700;
            color: var(--primary);
        }

        /* 画布容器 */
        .canvas-container {
            position: relative;
            border-radius: var(--border-radius);
            padding: 2px;
            background: linear-gradient(45deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #gameCanvas {
            display: block;
            background: #111116;
            border-radius: calc(var(--border-radius) - 2px);
            /* width: 100%; */
            /* height: auto; */
            /* image-rendering: pixelated; */
        }

        /* 开始/暂停 遮罩层 */
        .overlay-screen {
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            background: rgba(15, 15, 19, 0.85);
            backdrop-filter: blur(8px);
            border-radius: calc(var(--border-radius) - 2px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .overlay-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .big-title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        /* 按钮样式 */
        .btn {
            background: var(--text-main);
            color: #000;
            border: none;
            padding: 14px 32px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.15);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-main);
            margin-top: 12px;
        }

        .btn-outline:hover {
            border-color: var(--text-main);
            background: rgba(255,255,255,0.05);
        }

        /* 虚拟控制器 (移动端) */
        .mobile-controls {
            display: none;
            grid-template-areas: 
                ". up ."
                "left down right";
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .d-pad-btn {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.1s;
            -webkit-user-select: none;
            user-select: none;
        }

        .d-pad-btn:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.95);
        }

        /* 键盘提示 */
        .keyboard-hints {
            display: flex;
            gap: 24px;
            margin-top: 24px;
            color: var(--text-muted);
            font-size: 12px;
        }

        .key-hint {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .kbd {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        /* 动画 */
        @keyframes pulse {
            0% { opacity: 1; box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); }
            70% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(0, 255, 136, 0); }
            100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .mobile-controls {
                display: grid;
            }
            .keyboard-hints {
                display: none;
            }
            .game-wrapper {
                padding: 10px;
            }
        }
    </style>
</head>

<body>

    <div class="game-wrapper">
        <!-- 头部 -->
        <div class="hud-header">
            <div class="game-title">SNAKE.IO</div>
            <div class="stats-bar">
                <div class="stat-capsule">
                    <span class="stat-label">Score</span>
                    <span class="stat-value" id="scoreValue">0</span>
                </div>
                <div class="stat-capsule">
                    <span class="stat-label">Best</span>
                    <span class="stat-value" id="highScoreValue">0</span>
                </div>
            </div>
        </div>

        <!-- 游戏区域 -->
        <div class="canvas-container">
            <canvas id="gameCanvas" width="400" height="400"></canvas>

            <!-- 覆盖层：开始/暂停/结束 -->
            <div id="gameOverlay" class="overlay-screen">
                <h1 class="big-title" id="overlayTitle">READY?</h1>
                <p class="subtitle" id="overlaySubtitle">Press Start to Play</p>
                <button class="btn" id="mainActionBtn">START GAME</button>
            </div>
        </div>

        <!-- 移动端控制器 -->
        <div class="mobile-controls">
            <button class="d-pad-btn" style="grid-area: up;" data-dir="up">▲</button>
            <button class="d-pad-btn" style="grid-area: left;" data-dir="left">◀</button>
            <button class="d-pad-btn" style="grid-area: down;" data-dir="down">▼</button>
            <button class="d-pad-btn" style="grid-area: right;" data-dir="right">▶</button>
        </div>

        <!-- 键盘提示 -->
        <div class="keyboard-hints">
            <div class="key-hint">
                <span class="kbd">WASD / ARROWS</span>
                <span>Move</span>
            </div>
            <div class="key-hint">
                <span class="kbd">SPACE</span>
                <span>Pause</span>
            </div>
        </div>
    </div>

    <script>
        class SnakeGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                // 响应式画布大小
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());

                this.gridSize = 20;
                this.tileCount = 20; // 20x20 网格
                
                this.state = 'MENU'; // MENU, PLAYING, PAUSED, GAMEOVER
                this.score = 0;
                this.highScore = localStorage.getItem('snake_highscore') || 0;
                this.gameSpeed = 150;
                
                this.snake = [];
                this.food = {};
                this.direction = { x: 0, y: 0 };
                this.nextDirection = { x: 0, y: 0 };
                
                this.initElements();
                this.bindEvents();
                this.render(); // 初始渲染
            }

            resizeCanvas() {
                // 简单适配：在小屏幕上缩小画布
                const maxWidth = Math.min(window.innerWidth - 40, 400);
                this.canvas.width = maxWidth;
                this.canvas.height = maxWidth;
                // 重新计算格子大小以适应新画布
                // 注意：这里为了逻辑简单，保持逻辑网格数量不变，缩放视觉
                this.scaleFactor = maxWidth / 400; 
            }

            initElements() {
                this.scoreEl = document.getElementById('scoreValue');
                this.highScoreEl = document.getElementById('highScoreValue');
                this.overlay = document.getElementById('gameOverlay');
                this.overlayTitle = document.getElementById('overlayTitle');
                this.overlaySubtitle = document.getElementById('overlaySubtitle');
                this.mainBtn = document.getElementById('mainActionBtn');
                
                this.highScoreEl.textContent = this.highScore;
            }

            bindEvents() {
                document.addEventListener('keydown', (e) => this.handleInput(e));
                this.mainBtn.addEventListener('click', () => this.handleMainAction());
                
                // 移动端触摸
                document.querySelectorAll('.d-pad-btn').forEach(btn => {
                    btn.addEventListener('touchstart', (e) => {
                        e.preventDefault(); // 防止双击缩放
                        this.handleTouchInput(btn.dataset.dir);
                    });
                     btn.addEventListener('mousedown', (e) => {
                        this.handleTouchInput(btn.dataset.dir);
                    });
                });
            }

            handleMainAction() {
                if (this.state === 'MENU' || this.state === 'GAMEOVER') {
                    this.startGame();
                } else if (this.state === 'PAUSED') {
                    this.resumeGame();
                } else if (this.state === 'PLAYING') {
                    this.pauseGame();
                }
            }

            startGame() {
                this.state = 'PLAYING';
                this.score = 0;
                this.updateScore(0);
                this.gameSpeed = 150;
                
                // 初始化蛇 (居中)
                const center = Math.floor(this.tileCount / 2);
                this.snake = [
                    { x: center, y: center },
                    { x: center, y: center + 1 },
                    { x: center, y: center + 2 }
                ];
                
                // 初始向上移动
                this.direction = { x: 0, y: -1 };
                this.nextDirection = { x: 0, y: -1 };
                
                this.spawnFood();
                this.overlay.classList.add('hidden');
                
                if (this.loopId) clearInterval(this.loopId);
                this.loopId = setInterval(() => this.gameLoop(), this.gameSpeed);
            }

            pauseGame() {
                this.state = 'PAUSED';
                clearInterval(this.loopId);
                this.showOverlay('PAUSED', 'Game is paused', 'RESUME');
            }

            resumeGame() {
                this.state = 'PLAYING';
                this.overlay.classList.add('hidden');
                this.loopId = setInterval(() => this.gameLoop(), this.gameSpeed);
            }

            gameOver() {
                this.state = 'GAMEOVER';
                clearInterval(this.loopId);
                
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('snake_highscore', this.highScore);
                    this.highScoreEl.textContent = this.highScore;
                }
                
                this.showOverlay('GAME OVER', `Final Score: ${this.score}`, 'TRY AGAIN');
            }

            showOverlay(title, subtitle, btnText) {
                this.overlayTitle.textContent = title;
                this.overlaySubtitle.textContent = subtitle;
                this.mainBtn.textContent = btnText;
                this.overlay.classList.remove('hidden');
            }

            handleInput(e) {
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'w', 'a', 's', 'd'].includes(e.key)) {
                    e.preventDefault();
                }

                if (e.key === ' ' && this.state === 'PLAYING') {
                    this.pauseGame();
                    return;
                }
                
                // 方向控制
                const map = {
                    'ArrowUp': {x: 0, y: -1}, 'w': {x: 0, y: -1},
                    'ArrowDown': {x: 0, y: 1}, 's': {x: 0, y: 1},
                    'ArrowLeft': {x: -1, y: 0}, 'a': {x: -1, y: 0},
                    'ArrowRight': {x: 1, y: 0}, 'd': {x: 1, y: 0}
                };

                const dir = map[e.key];
                if (dir && this.state === 'PLAYING') {
                    // 防止掉头
                    if (dir.x !== -this.direction.x && dir.y !== -this.direction.y) {
                        this.nextDirection = dir;
                    }
                }
            }

            handleTouchInput(dirStr) {
                 const map = {
                    'up': {x: 0, y: -1},
                    'down': {x: 0, y: 1},
                    'left': {x: -1, y: 0},
                    'right': {x: 1, y: 0}
                };
                const dir = map[dirStr];
                if (dir && this.state === 'PLAYING') {
                     if (dir.x !== -this.direction.x && dir.y !== -this.direction.y) {
                        this.nextDirection = dir;
                    }
                }
            }

            spawnFood() {
                let valid = false;
                while (!valid) {
                    this.food = {
                        x: Math.floor(Math.random() * this.tileCount),
                        y: Math.floor(Math.random() * this.tileCount)
                    };
                    // 确保不生成在蛇身上
                    valid = !this.snake.some(seg => seg.x === this.food.x && seg.y === this.food.y);
                }
            }

            updateScore(points) {
                this.score = points;
                this.scoreEl.textContent = this.score;
            }

            gameLoop() {
                this.direction = this.nextDirection;

                const head = { ...this.snake[0] };
                head.x += this.direction.x;
                head.y += this.direction.y;

                // 撞墙检测
                if (head.x < 0 || head.x >= this.tileCount || head.y < 0 || head.y >= this.tileCount) {
                    this.gameOver();
                    return;
                }

                // 撞自己检测
                if (this.snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                    this.gameOver();
                    return;
                }

                this.snake.unshift(head);

                // 吃食物
                if (head.x === this.food.x && head.y === this.food.y) {
                    this.score += 10;
                    this.updateScore(this.score);
                    this.spawnFood();
                    // 简单的加速逻辑
                    if (this.gameSpeed > 50) {
                        this.gameSpeed -= 2;
                        clearInterval(this.loopId);
                        this.loopId = setInterval(() => this.gameLoop(), this.gameSpeed);
                    }
                } else {
                    this.snake.pop();
                }

                this.render();
            }

            render() {
                // 清空画布
                this.ctx.fillStyle = '#111116';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // 计算实际绘制尺寸
                const cellSize = this.canvas.width / this.tileCount;

                // 绘制食物 (带发光效果)
                this.ctx.shadowBlur = 15;
                this.ctx.shadowColor = '#ff0055';
                this.ctx.fillStyle = '#ff0055';
                
                // 食物绘制为圆形
                const foodX = this.food.x * cellSize + cellSize/2;
                const foodY = this.food.y * cellSize + cellSize/2;
                
                this.ctx.beginPath();
                this.ctx.arc(foodX, foodY, cellSize/2 - 2, 0, Math.PI * 2);
                this.ctx.fill();

                // 重置阴影给蛇
                this.ctx.shadowBlur = 0;

                // 绘制蛇
                this.snake.forEach((seg, index) => {
                    const x = seg.x * cellSize;
                    const y = seg.y * cellSize;
                    const size = cellSize - 2; // 留一点间隙

                    // 蛇头
                    if (index === 0) {
                        this.ctx.fillStyle = '#00ff88';
                        this.ctx.shadowBlur = 10;
                        this.ctx.shadowColor = 'rgba(0, 255, 136, 0.5)';
                    } else {
                        // 蛇身渐变
                        this.ctx.fillStyle = `rgba(0, 255, 136, ${1 - index / (this.snake.length + 5)})`;
                        this.ctx.shadowBlur = 0;
                    }

                    // 圆角矩形蛇身
                    this.roundRect(this.ctx, x + 1, y + 1, size, size, 4);
                    this.ctx.fill();
                    
                    // 简单的眼睛 (如果是头)
                    if (index === 0) {
                         this.ctx.fillStyle = '#000';
                         // 根据方向画眼睛位置
                         // 简化：总是画在中心
                         this.ctx.fillRect(x + size/2 - 2, y + size/2 - 2, 4, 4);
                    }
                });
            }
            
            // 辅助函数：绘制圆角矩形
            roundRect(ctx, x, y, width, height, radius) {
                ctx.beginPath();
                ctx.moveTo(x + radius, y);
                ctx.lineTo(x + width - radius, y);
                ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
                ctx.lineTo(x + width, y + height - radius);
                ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
                ctx.lineTo(x + radius, y + height);
                ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
                ctx.lineTo(x, y + radius);
                ctx.quadraticCurveTo(x, y, x + radius, y);
                ctx.closePath();
            }
        }

        // 启动游戏
        window.onload = () => {
            const game = new SnakeGame();
        };
    </script>
</body>

</html>
