<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博朋克 3D 赛车 (Cyberpunk 3D Racing)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #0ff;
            pointer-events: none;
            text-shadow: 0 0 10px #0ff;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .info {
            font-size: 16px;
            margin-bottom: 5px;
        }
        .controls {
            margin-top: 20px;
            font-size: 14px;
            color: #f0f;
            text-shadow: 0 0 10px #f0f;
        }
        #speedometer {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 15px #0ff, 0 0 30px #0ff;
            margin-top: 10px;
        }
    </style>
    <!-- 使用 Import Map 引入 Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-layer">
        <h1>Neon Racer 3D</h1>
        <div class="info">状态: 引擎已启动</div>
        <div id="speedometer">0 KM/H</div>
        <div class="controls">
            [W] / [↑] : 加速 (Accelerate)<br>
            [S] / [↓] : 刹车/倒车 (Brake/Reverse)<br>
            [A] / [←] : 左转 (Steer Left)<br>
            [D] / [→] : 右转 (Steer Right)<br>
            [Space] : 氮气加速 (Nitro Boost)<br><br>
            <span style="color: yellow;">※ 提示：如果无法移动，请先用鼠标点击一下画面，或关闭中文输入法。</span>
        </div>
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- 1. 基础场景设置 ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.015); // 赛博朋克黑雾

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // --- 2. 后期处理 (泛光/发光效果) ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.2;
        bloomPass.strength = 2.0; // 发光强度
        bloomPass.radius = 0.5;

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- 3. 创建赛车 (程序化生成 F1 赛车) ---
        const carGroup = new THREE.Group();
        scene.add(carGroup);

        // 绘制五星红旗纹理作为车身贴图
        function createChinaFlagTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            // 红色背景
            ctx.fillStyle = '#ee1c25';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制大五角星
            ctx.fillStyle = '#ffff00';
            drawStar(ctx, 85, 64, 25, 0);
            
            // 绘制小五角星
            drawStar(ctx, 170, 25, 8, Math.PI / 6);
            drawStar(ctx, 204, 51, 8, Math.PI / 4);
            drawStar(ctx, 204, 93, 8, 0);
            drawStar(ctx, 170, 119, 8, -Math.PI / 6);

            // 增加中国字样
            ctx.font = 'bold 70px "Microsoft YaHei", sans-serif';
            ctx.fillStyle = '#ffff00';
            ctx.fillText('中 国', 260, 160);
            
            function drawStar(ctx, cx, cy, radius, rotation) {
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(rotation);
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    ctx.lineTo(Math.cos((18 + i * 72) / 180 * Math.PI) * radius,
                               -Math.sin((18 + i * 72) / 180 * Math.PI) * radius);
                    ctx.lineTo(Math.cos((54 + i * 72) / 180 * Math.PI) * (radius / 2.5),
                               -Math.sin((54 + i * 72) / 180 * Math.PI) * (radius / 2.5));
                }
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }

        const flagTexture = createChinaFlagTexture();

        // 材质
        const bodyMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xff3333, // 中国红
            map: flagTexture,
            roughness: 0.2, 
            metalness: 0.7 
        });
        const blackMaterial = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8, metalness: 0.2 });
        const neonCyanMaterial = new THREE.MeshBasicMaterial({ color: 0x00ffff }); // 霓虹青色
        const neonPinkMaterial = new THREE.MeshBasicMaterial({ color: 0xff00ff }); // 霓虹粉色
        const tireMaterial = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.9 });

        // 1. F1 车身主干 (修长)
        const chassisGeo = new THREE.BoxGeometry(1.2, 0.4, 4.5);
        const chassis = new THREE.Mesh(chassisGeo, bodyMaterial);
        chassis.position.y = 0.4;
        carGroup.add(chassis);

        // 2. 驾驶舱隆起
        const cabinGeo = new THREE.BoxGeometry(0.8, 0.4, 1.5);
        const cabin = new THREE.Mesh(cabinGeo, bodyMaterial);
        cabin.position.set(0, 0.8, -0.5);
        carGroup.add(cabin);

        // 3. 前鼻翼
        const frontWingGeo = new THREE.BoxGeometry(2.4, 0.05, 0.6);
        const frontWing = new THREE.Mesh(frontWingGeo, bodyMaterial);
        frontWing.position.set(0, 0.2, -2.2);
        carGroup.add(frontWing);
        
        // 前鼻翼连接件
        const frontNoseGeo = new THREE.BoxGeometry(0.6, 0.2, 0.8);
        const frontNose = new THREE.Mesh(frontNoseGeo, bodyMaterial);
        frontNose.position.set(0, 0.3, -1.8);
        carGroup.add(frontNose);

        // 4. 后尾翼
        const rearWingGeo = new THREE.BoxGeometry(2.2, 0.05, 0.8);
        const rearWing = new THREE.Mesh(rearWingGeo, bodyMaterial);
        rearWing.position.set(0, 1.2, 2.0);
        carGroup.add(rearWing);

        // 后尾翼支架
        const wingSupportGeo = new THREE.BoxGeometry(0.1, 0.8, 0.4);
        const leftSupport = new THREE.Mesh(wingSupportGeo, blackMaterial);
        leftSupport.position.set(-0.6, 0.8, 2.0);
        carGroup.add(leftSupport);
        const rightSupport = new THREE.Mesh(wingSupportGeo, blackMaterial);
        rightSupport.position.set(0.6, 0.8, 2.0);
        carGroup.add(rightSupport);

        // 车身霓虹灯带 (侧边)
        const stripGeo = new THREE.BoxGeometry(1.3, 0.05, 4.5);
        const strip = new THREE.Mesh(stripGeo, neonCyanMaterial);
        strip.position.y = 0.2;
        carGroup.add(strip);

        // 尾灯 (F1的尾部雨灯)
        const tailLightGeo = new THREE.BoxGeometry(0.3, 0.2, 0.1);
        const tailLight = new THREE.Mesh(tailLightGeo, neonPinkMaterial);
        tailLight.position.set(0, 0.4, 2.26);
        carGroup.add(tailLight);

        // 车轮生成函数
        function createWheel(x, z, isFront) {
            // F1 后轮比前轮宽大
            const width = isFront ? 0.4 : 0.6;
            const radius = isFront ? 0.45 : 0.5;
            
            const wheelGroup = new THREE.Group();
            wheelGroup.position.set(x, radius, z);

            const wheelGeo = new THREE.CylinderGeometry(radius, radius, width, 32);
            const wheel = new THREE.Mesh(wheelGeo, tireMaterial);
            wheel.rotation.z = Math.PI / 2;
            wheelGroup.add(wheel);
            
            // 轮毂发光
            const rimGeo = new THREE.CylinderGeometry(radius * 0.6, radius * 0.6, width + 0.02, 16);
            const rim = new THREE.Mesh(rimGeo, isFront ? neonCyanMaterial : neonPinkMaterial);
            rim.rotation.z = Math.PI / 2;
            wheelGroup.add(rim);
            
            carGroup.add(wheelGroup);
            return wheelGroup; // 返回组以便于旋转
        }

        const wheels = [
            createWheel(-1.1, -1.5, true), // 左前
            createWheel(1.1, -1.5, true),  // 右前
            createWheel(-1.2, 1.5, false), // 左后
            createWheel(1.2, 1.5, false)   // 右后
        ];

        // --- 4. 环境与灯光 ---
        // 提升环境光亮度，让车体更清晰可见
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        
        // 增加方向光照亮车身细节
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);
        
        // 赛车头灯 (聚光灯)
        const headLight = new THREE.SpotLight(0x00ffff, 50, 100, Math.PI/4, 0.5, 1);
        headLight.position.set(0, 0.5, -2);
        headLight.target.position.set(0, 0, -10);
        carGroup.add(headLight);
        carGroup.add(headLight.target);

        // 赛博朋克网格地面
        const gridHelper = new THREE.GridHelper(200, 100, 0xff00ff, 0x440044);
        gridHelper.position.y = 0;
        scene.add(gridHelper);

        // 速度线 (粒子系统)
        const particleCount = 1000;
        const particleGeo = new THREE.BufferGeometry();
        const particlePos = new Float32Array(particleCount * 3);
        for(let i=0; i < particleCount * 3; i+=3) {
            particlePos[i] = (Math.random() - 0.5) * 100; // x
            particlePos[i+1] = Math.random() * 20;        // y
            particlePos[i+2] = (Math.random() - 0.5) * 100; // z
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x00ffff, size: 0.2 });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);

        // --- 5. 物理与控制逻辑 ---
        const keys = { w: false, a: false, s: false, d: false, space: false };
        
        window.addEventListener('keydown', (e) => {
            const code = e.code;
            if(code === 'KeyW' || code === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.w = true;
            if(code === 'KeyA' || code === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.a = true;
            if(code === 'KeyS' || code === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.s = true;
            if(code === 'KeyD' || code === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.d = true;
            if(code === 'Space' || e.key === ' ') keys.space = true;
        });

        window.addEventListener('keyup', (e) => {
            const code = e.code;
            if(code === 'KeyW' || code === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.w = false;
            if(code === 'KeyA' || code === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.a = false;
            if(code === 'KeyS' || code === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.s = false;
            if(code === 'KeyD' || code === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.d = false;
            if(code === 'Space' || e.key === ' ') keys.space = false;
        });

        // 赛车状态变量
        let speed = 0;
        let maxSpeed = 1.5;
        const acceleration = 0.02;
        const friction = 0.01;
        let steeringAngle = 0;
        const turnSpeed = 0.03;

        const speedometerUI = document.getElementById('speedometer');

        // --- 6. 动画循环 ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // 1. 处理加速与刹车
            let currentMaxSpeed = keys.space ? maxSpeed * 2 : maxSpeed; // 氮气加速
            
            if (keys.w) {
                speed += acceleration;
            } else if (keys.s) {
                speed -= acceleration;
            } else {
                // 摩擦力减速
                if (speed > 0) speed -= friction;
                if (speed < 0) speed += friction;
                if (Math.abs(speed) < friction) speed = 0;
            }

            // 限制速度
            speed = Math.max(-maxSpeed / 2, Math.min(speed, currentMaxSpeed));

            // 2. 处理转向 (只有在移动时才能转向)
            if (Math.abs(speed) > 0.01) {
                const turnDir = speed > 0 ? 1 : -1; // 倒车时转向相反
                if (keys.a) steeringAngle += turnSpeed * turnDir;
                if (keys.d) steeringAngle -= turnSpeed * turnDir;
            }

            // 摩擦力让方向盘回正
            steeringAngle *= 0.9;

            // 3. 更新赛车位置和旋转
            carGroup.rotation.y = steeringAngle;
            
            // 视觉效果：加速时车头上抬，刹车时车头下沉
            const targetTilt = speed * 0.05;
            carGroup.rotation.x += (targetTilt - carGroup.rotation.x) * 0.1;
            
            // 视觉效果：转向时车身倾斜
            const targetRoll = steeringAngle * 0.5;
            carGroup.rotation.z += (targetRoll - carGroup.rotation.z) * 0.1;

            // 滚动车轮
            wheels.forEach(wheel => {
                wheel.rotation.x -= speed * 0.5;
            });
            // 前轮转向视觉
            wheels[0].rotation.y = steeringAngle * 2;
            wheels[1].rotation.y = steeringAngle * 2;

            // 4. 环境移动 (模拟赛车向前开，实际上是环境向后退)
            const moveX = Math.sin(steeringAngle) * speed;
            const moveZ = Math.cos(steeringAngle) * speed;

            // 移动网格
            gridHelper.position.z += moveZ;
            if (gridHelper.position.z > 2) {
                gridHelper.position.z -= 2; // 无缝循环
            } else if (gridHelper.position.z < 0) {
                gridHelper.position.z += 2;
            }
            
            gridHelper.position.x += moveX;
            if (gridHelper.position.x > 2) gridHelper.position.x -= 2;
            if (gridHelper.position.x < 0) gridHelper.position.x += 2;

            // 移动粒子(速度线)
            const positions = particles.geometry.attributes.position.array;
            for(let i=0; i < particleCount * 3; i+=3) {
                positions[i] += moveX * 2;     // x
                positions[i+2] += moveZ * 2;   // z
                
                if(positions[i] > 50) positions[i] = -50;
                if(positions[i] < -50) positions[i] = 50;
                if(positions[i+2] > 50) positions[i+2] = -50;
                if(positions[i+2] < -50) positions[i+2] = 50;
            }
            particles.geometry.attributes.position.needsUpdate = true;
            
            // 氮气加速时粒子变红
            particleMat.color.setHex(keys.space ? 0xff00ff : 0x00ffff);

            // 5. 相机跟随
            // 相机放在车后上方
            const cameraOffset = new THREE.Vector3(0, 3, 8);
            // 根据速度拉远相机 (FOV 效果)
            cameraOffset.z += Math.abs(speed) * 2;
            
            camera.position.lerp(cameraOffset, 0.1);
            camera.lookAt(carGroup.position);

            // 6. 更新 UI
            const displaySpeed = Math.abs(Math.round(speed * 150));
            speedometerUI.innerText = `${displaySpeed} KM/H`;
            speedometerUI.style.color = keys.space ? '#f0f' : '#fff';

            // 渲染
            composer.render();
        }

        // 窗口缩放适配
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // 启动动画
        animate();
    </script>
</body>
</html>
